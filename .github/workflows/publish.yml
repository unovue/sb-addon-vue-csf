name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Required permissions for npm Trusted Publishing (provenance)
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Update npm (Trusted Publishers requires npm >= 11.5.1)
        run: npm install -g npm@^11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # Trusted Publishing: uses GitHub OIDC token instead of npm token
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
