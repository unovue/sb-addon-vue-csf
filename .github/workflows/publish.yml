name: Publish

on:
  push:
    tags:
      - 'v*'

# Required permissions for npm Trusted Publishing (provenance)
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: pnpm test

      # Trusted Publishing: uses GitHub OIDC token instead of npm token
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
